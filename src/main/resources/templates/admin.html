<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nooran kahvikauppa - tuotteet</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
  </head>
  <body>
    <header th:replace="fragments/header :: header">
      <p>header with links etc</p>
    </header>
    <nav th:replace="fragments/admin-nav :: admin-nav">
      <p>header with links etc</p>
    </nav>

    <h2>Accounts</h2>

    <ol>
      <li th:each="account : ${accounts}">
        <span th:text="${account.username}">msg</span>
      </li>
    </ol>

    <div style="width: 500px">
      <form method="POST" th:action="@{/admin}">
        <input type="text" name="username" />
        <input type="password" name="password" />
        <input type="text" name="role" />
        <input type="submit" value="Add new account!" />
      </form>
    </div>

    <footer th:replace="fragments/footer :: footer">
      <p class="footer"></p>
    </footer>
  </body>
</html>
